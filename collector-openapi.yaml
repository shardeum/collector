openapi: 3.0.0
info:
  title: Collector API
  version: 1.0.0
paths:
  /api/account:
    get:
      summary: Get account information
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of accounts to retrieve (maximum 1000)
        - name: page
          in: query
          schema:
            type: string
          description: Page number for paginated results
        - name: address
          in: query
          schema:
            type: string
          description: Account address to retrieve
        - name: type
          in: query
          schema:
            type: string
          description: Filter accounts by type
        - name: accountType
          in: query
          schema:
            type: string
          description: Specific account type to filter when querying by address
        - name: startCycle
          in: query
          schema:
            type: string
          description: Starting cycle number for filtering accounts
        - name: endCycle
          in: query
          schema:
            type: string
          description: Ending cycle number for filtering accounts
        - name: accountId
          in: query
          schema:
            type: string
          description: Account ID to retrieve (must be 64 characters)
        - name: blockNumber
          in: query
          schema:
            type: string
          description: Block number for historical account state retrieval
        - name: blockHash
          in: query
          schema:
            type: string
          description: Block hash for historical account state retrieval
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/token:
    get:
      summary: Get token information
      parameters:
        - name: page
          in: query
          schema:
            type: string
          description: Page number for paginated results
        - name: address
          in: query
          schema:
            type: string
          description: Account address to retrieve tokens for
        - name: contractAddress
          in: query
          schema:
            type: string
          description: Contract address to filter tokens
        - name: tokenType
          in: query
          schema:
            type: string
          description: Type of token to filter
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/transaction:
    get:
      summary: Get transaction information
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of transactions to retrieve (maximum 1000)
        - name: page
          in: query
          schema:
            type: string
          description: Page number for paginated results
        - name: txHash
          in: query
          schema:
            type: string
          description: Transaction hash to query (must be 66 characters)
        - name: address
          in: query
          schema:
            type: string
          description: Account address to filter transactions (42 or 64 characters)
        - name: token
          in: query
          schema:
            type: string
          description: Token address for additional filtering
        - name: filterAddress
          in: query
          schema:
            type: string
          description: Secondary filter for token balance (must be 42 characters)
        - name: txType
          in: query
          schema:
            type: string
          description: Transaction type filter
        - name: startCycle
          in: query
          schema:
            type: string
          description: Starting cycle number for transaction query
        - name: endCycle
          in: query
          schema:
            type: string
          description: Ending cycle number for transaction query (max range of 100 cycles)
        - name: txId
          in: query
          schema:
            type: string
          description: Unique transaction identifier
        - name: type
          in: query
          schema:
            type: string
          description: Additional flag; set to "requery" to force a fresh database lookup
        - name: totalStakeData
          in: query
          schema:
            type: string
          description: Set "true" to retrieve total stake and unstake transaction data
        - name: beforeTimestamp
          in: query
          schema:
            type: string
          description: Filter transactions with a timestamp before this value (in milliseconds)
        - name: afterTimestamp
          in: query
          schema:
            type: string
          description: Filter transactions with a timestamp after this value (in milliseconds)
        - name: blockNumber
          in: query
          schema:
            type: string
          description: Block number for historical transaction retrieval (non-negative)
        - name: blockHash
          in: query
          schema:
            type: string
          description: Block hash for historical transaction retrieval (must be 66 characters)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /usage/metrics:
    get:
      summary: Get usage metrics
      security:
        - usageKey: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/receipt:
    get:
      summary: Get receipt information
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of receipts to retrieve (maximum 1000)
        - name: page
          in: query
          schema:
            type: string
          description: Page number for pagination
        - name: txId
          in: query
          schema:
            type: string
          description: Transaction ID to retrieve a specific receipt
        - name: startCycle
          in: query
          schema:
            type: string
          description: Starting cycle number for filtering receipts
        - name: endCycle
          in: query
          schema:
            type: string
          description: Ending cycle number for filtering receipts
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/originalTx:
    get:
      summary: Get original transaction information
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of original transactions to retrieve (maximum 1000)
        - name: page
          in: query
          schema:
            type: string
          description: Page number for pagination
        - name: txId
          in: query
          schema:
            type: string
          description: Transaction ID to retrieve a specific original transaction
        - name: txHash
          in: query
          schema:
            type: string
          description: Transaction hash to retrieve a specific original transaction
        - name: startCycle
          in: query
          schema:
            type: string
          description: Starting cycle number for filtering original transactions
        - name: endCycle
          in: query
          schema:
            type: string
          description: Ending cycle number for filtering original transactions
        - name: decode
          in: query
          schema:
            type: string
          description: Whether to decode the EVM raw transaction data
        - name: pending
          in: query
          schema:
            type: string
          description: Filter for pending transactions
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OriginalTxResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/log:
    get:
      summary: Get log information
      parameters:
        - name: count
          in: query
          schema:
            type: string
          description: Number of logs to retrieve (maximum 1000)
        - name: page
          in: query
          schema:
            type: string
          description: Page number for pagination
        - name: address
          in: query
          schema:
            type: string
          description: Filter logs by address
        - name: topic0
          in: query
          schema:
            type: string
          description: First topic filter
        - name: topic1
          in: query
          schema:
            type: string
          description: Second topic filter
        - name: topic2
          in: query
          schema:
            type: string
          description: Third topic filter
        - name: topic3
          in: query
          schema:
            type: string
          description: Fourth topic filter
        - name: type
          in: query
          schema:
            type: string
          description: Additional flag; set to "requery" to force a fresh database lookup
        - name: fromBlock
          in: query
          schema:
            type: string
          description: Block number for historical log retrieval (non-negative)
        - name: toBlock
          in: query
          schema:
            type: string
          description: Block number for historical log retrieval (non-negative)
        - name: blockHash
          in: query
          schema:
            type: string
          description: Block hash for historical log retrieval (must be 66 characters)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /totalData:
    get:
      summary: Get total data information
      parameters:
        - name: totalStakeData
          in: query
          schema:
            type: string
        - name: beforeTimestamp
          in: query
          schema:
            type: string
        - name: afterTimestamp
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalDataResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/blocks:
    get:
      summary: Get block information
      parameters:
        - name: blockNumber
          in: query
          schema:
            type: string
          description: A hexadecimal representation of the block number. Use "latest" or "earliest" to fetch the corresponding block, or provide a hex string for a specific block.
        - name: blockHash
          in: query
          schema:
            type: string
          description: The block hash. Also accepts "latest" or "earliest" to retrieve a block by tag.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/logs:
    get:
      summary: Get v2 log information
      parameters:
        - name: fromBlock
          in: query
          schema:
            type: string
        - name: toBlock
          in: query
          schema:
            type: string
        - name: address
          in: query
          schema:
            type: string
        - name: topics
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /is-alive:
    get:
      summary: Check if the server is alive
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsAliveResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /is-healthy:
    get:
      summary: Check if the server is healthy
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsHealthyResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cycleinfo:
    get:
      summary: Get the current cycle information
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CycleInfoResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /port:
    get:
      summary: Retrieve the collector server port
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    usageKey:
      type: apiKey
      name: x-usage-key
      in: header
  schemas:
    AccountResponse:
      type: object
      properties:
        success:
          type: boolean
        accounts:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalAccounts:
          type: integer
        totalContracts:
          type: integer
    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
        tokens:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalTokenHolders:
          type: integer
    TransactionResponse:
      type: object
      properties:
        success:
          type: boolean
        transactions:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalTransactions:
          type: integer
        totalStakeTxs:
          type: integer
        totalRewardTxs:
          type: integer
        totalUnstakeTxs:
          type: integer
        filterAddressTokenBalance:
          type: number
    MetricsResponse:
      type: object
      properties:
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
        enableForInMinutes:
          type: integer
        usage:
          type: object
          additionalProperties:
            type: integer
        errors:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
    ReceiptResponse:
      type: object
      properties:
        success:
          type: boolean
        receipts:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalReceipts:
          type: integer
    OriginalTxResponse:
      type: object
      properties:
        success:
          type: boolean
        originalTxs:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalOriginalTxs:
          type: integer
    LogResponse:
      type: object
      properties:
        success:
          type: boolean
        logs:
          type: array
          items:
            type: object
        totalPages:
          type: integer
        totalLogs:
          type: integer
    TotalDataResponse:
      type: object
      properties:
        success:
          type: boolean
        totalData:
          type: object
    BlockResponse:
      type: object
      properties:
        success:
          type: boolean
        block:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
    IsAliveResponse:
      type: object
      properties:
        success:
          type: boolean
        alive:
          type: boolean
    IsHealthyResponse:
      type: object
      properties:
        success:
          type: boolean
        healthy:
          type: boolean
    CycleInfoResponse:
      type: object
      properties:
        success:
          type: boolean
        cycles:
          type: array
          items:
            type: object
    PortResponse:
      type: object
      properties:
        port:
          type: integer
          description: Port number of the collector server
